<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="188" viewBox="0 80 1200 188" role="img" aria-label="secure-telegram-mcp: all your Telegram accounts, one scoped endpoint per AI client">
  <!-- mark: the locked message -->
  <g transform="translate(150,152) scale(1.55) translate(-60,-58)">
  <path d="M 35,26 H 85 A 17,17 0 0 1 102,43 V 69 A 17,17 0 0 1 85,86 H 35 A 17,17 0 0 1 18,69 V 43 A 17,17 0 0 1 35,26 Z"
