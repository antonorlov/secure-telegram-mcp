name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Architecture / denylist guard
        run: npm run guard
      - name: Lint
        run: npm run lint
      - name: Knip (dead exports / deps)
        run: npm run knip
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: PTY e2e (isolated, after build)
        run: npm run test:pty
